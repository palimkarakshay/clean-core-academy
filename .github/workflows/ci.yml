name: ci

# The build gate: lint + type-check + unit tests + production build + abaplint,
# on every push and PR. Hermetic — no secrets required (the app builds with the
# default content pack and the abaplint check runs over the committed exercises).

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run type-check
      - name: Unit + contract tests
        run: npm test
      - name: Build (prerender every route)
        run: npm run build
      - name: abaplint (reference solutions)
        run: npm run lint:abap
